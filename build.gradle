plugins {
    id 'java'
}

repositories {
    mavenCentral()

}

dependencies {
    testImplementation 'junit:junit:4.12'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

task run(type:JavaExec){
    mainClass='org.example.App'
    classpath= sourceSets.main.runtimeClasspath
}
